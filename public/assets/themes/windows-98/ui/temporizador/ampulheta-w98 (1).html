<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ampulheta</title>
<style>
  :root{
    --bg:transparent;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: transparent;
  }
  .hourglass-svg{
    width: 100%;
    height: 100%;
    max-width: 96px;
    max-height: 136px;
    transform-origin: 50% 50%;
    transition: transform 0.9s cubic-bezier(.5,-0.2,.5,1.2);
  }
  /* Sem transicao suave de opacidade: troca instantanea, pixel a
     pixel, no estilo 8-bit/Windows 95-98. Uma transicao suave faria
     varios graos ficarem "pela metade" ao mesmo tempo, criando uma
     falsa sensacao de tremulacao/movimento errado na areia. */
  .hourglass-svg .grain{
    transition: none;
  }
</style>
</head>

function applyDrain(order, progress){
  const count = order.length;

  for(let i=0; i<count; i++){

    order[i].forEach(id => setOpacity(id, opacity));
  }
}

  }

function render(){
  if(cycleCount % 2 === 0){
    applyDrain(TOP_DRAIN_ORDER, progress);
    applyFill(BOTTOM_FILL_ORDER, progress);
  } else {
    applyDrain(BOTTOM_FILL_ORDER, progress);
    applyFill(TOP_DRAIN_ORDER, progress);
  }
}

function tick(){
  if(isFlipping) return;

  progress += 0.012;

  if(progress >= 1){
    progress = 1;
    render();
    doFlip();
    return;
  }

  render();
}

function doFlip(){
  isFlipping = true;

  rotationDeg += 180;
  svg.style.transform = `rotate(${rotationDeg}deg)`;

  setTimeout(() => {
    progress = 0;
    cycleCount++;
    render();
    isFlipping = false;
  }, 950);
}

render();
setInterval(tick, 70);
</script>
